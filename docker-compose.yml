version: "3.9"

# ═══════════════════════════════════════════════════════════
# EVIDRA Infrastructure — PostgreSQL 16 + Redis 7 + MinIO
# Run: docker compose up -d
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: evidra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evidra
      POSTGRES_PASSWORD: evidra_secret
      POSTGRES_DB: evidra_db
    ports:
      - "5432:5432"
    volumes:
      - evidra_pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidra -d evidra_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evidra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: evidra_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: evidra_minio
      MINIO_ROOT_PASSWORD: evidra_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - evidra_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  evidra_pgdata:
  evidra_minio_data:
